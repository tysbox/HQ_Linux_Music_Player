music_directory     "/var/lib/mpd/music"
playlist_directory  "/tmp/hq_mpd/playlists"
db_file             "/tmp/hq_mpd/tag_cache"
log_file            "/tmp/hq_mpd/mpd.log"
log_level           "default"
state_file          "/tmp/hq_mpd/state"
sticker_file        "/tmp/hq_mpd/sticker.sql"
bind_to_address     "127.0.0.1"
port                "6601"

# ─────────────────────────────────────────────────────────────────────
# 出力定義
#
# Output 1: ALSA Loopback  — DSPモード時の経由点
# Output 2: USB DAC        — Pureモード時の直結先（ビットパーフェクト）
# Output 3: PC Speaker     — Pureモード時の直結先（ヘッドフォンジャック含む）
# Output 4: Bluetooth      — Pure選択時はDSP経由パススルーに自動FB
#
# カード番号は aplay -l で確認し環境に合わせて修正してください。
# Loopback は名前指定なのでカード番号変動に影響されません。
# ─────────────────────────────────────────────────────────────────────

audio_output {
    type            "alsa"
    name            "ALSA Loopback"
    device          "hw:Loopback,0,0"
    format          "192000:32:2"
    mixer_type      "software"
}

audio_output {
    type            "alsa"
    name            "USB DAC"
    device          "plughw:3,0"  # SMSL USB AUDIO
    mixer_type      "none"
}

audio_output {
    type            "alsa"
    name            "PC Speaker"
    device          "plughw:2,0"  # HDA Intel PCH
    mixer_type      "software"
}

audio_output {
    type            "alsa"
    name            "Bluetooth"
    device          "plug:bluealsa"
    mixer_type      "hardware"
}
