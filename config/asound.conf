# /etc/asound.conf
#
# デフォルトデバイスは hw:0 (Loopback) ではなくシステムデフォルトに戻す。
# BlueALSA をデフォルトに設定すると CamillaDSP / aplay がフォールバック時に
# 意図せず BT デバイスを掴んでしまうため外してある。
#
# Bluetooth を使う場合のみ MAC アドレスを実機に合わせて変更してください。

defaults.bluealsa.interface "hci0"
defaults.bluealsa.device    "98:80:BB:45:62:43"   # ← 実機の BT MAC に変更
defaults.bluealsa.profile   "a2dp"
defaults.bluealsa.delay     20000

# USB DAC への便利エイリアス（任意）
# pcm.audiophile_dac { type plug; slave.pcm "hw:2,0"; }
