music_directory     "/var/lib/mpd/music"
playlist_directory  "/var/lib/mpd/playlists"
db_file             "/var/lib/mpd/tag_cache"
log_level           "default"
state_file          "/var/lib/mpd/state"
sticker_file        "/var/lib/mpd/sticker.sql"
bind_to_address     "127.0.0.1"
port                "6600"

# ─────────────────────────────────────────────────────────────────────
# 出力定義
#
# Output 1: ALSA Loopback  — DSPモード時の経由点
# Output 2: USB DAC        — Pureモード時の直結先（ビットパーフェクト）
# Output 3: PC Speaker     — Pureモード時の直結先（ヘッドフォンジャック含む）
# Output 4: Bluetooth      — Pure選択時はDSP経由パススルーに自動FB
#
# カード番号は aplay -l で確認し環境に合わせて修正してください。
# Loopback は名前指定なのでカード番号変動に影響されません。
# ─────────────────────────────────────────────────────────────────────

audio_output {
    type            "alsa"
    name            "ALSA Loopback"
    device          "hw:Loopback,0,0"
    format          "192000:32:2"
    mixer_type      "software"
}

audio_output {
    type            "alsa"
    name            "USB DAC"
    device          "plughw:2,0"      # USB DACのカード番号を aplay -l で確認
    mixer_type      "software"
}

audio_output {
    type            "alsa"
    name            "PC Speaker"
    device          "plughw:1,0"      # PCサウンドカードのカード番号を aplay -l で確認
    mixer_type      "software"
}

audio_output {
    type            "alsa"
    name            "Bluetooth"
    device          "plug:bluealsa"
    mixer_type      "software"
}
